<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Page</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6LcoYF0tAAAAACq-8RtzbWEFBoBsHBgbXt21noNY"></script>
    <script src="js/login.js"></script>
</head>

<header class="main-navbar">
    <div class="navbar-content">
        <a href="main.html" class="logo">2Shows</a>
    </div>
</header>

<body>
    <div class="login-container">
        <h2 id="login-title">Login</h2>
        <h4 id="login-error-message"></h4>
        <form action="/api/login" method="POST" id="login-form">
            <label for="email">Email</label>
            <input type="text" id="email" name="email" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit" >Sign In</button>
        </form>
    </div>
</body>
</html>
