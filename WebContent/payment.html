<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/payment.css">
</head>
<body>
<header class="main-navbar">
    <div class="navbar-content">
        <a href="main.html" class="logo">2Shows</a>
    </div>
    <form class="navbar-search" action="movie-list.html" method="GET">
        <div style="position:relative; display:flex; gap:6px; width:100%;">
            <input type="search"
                   id="navbar-search-input"
                   name="fulltext"
                   placeholder="Search movies…"
                   autocomplete="off">
            <button type="button" id="navbar-search-button">Search</button>
            <ul id="navbar-autocomplete-dropdown" class="autocomplete-dropdown" hidden></ul>
        </div>
    </form>
    <nav class="navbar-links">
        <a href="movie-list.html">Movies</a>
        <a href="_dashboard/index.html">Employee Dashboard</a>
        <a href="shopping-cart.html">Checkout</a>
        <a href="api/logout" class="logout-link">Logout</a>
    </nav>
</header>

<main class="payment-container">
    <a href="movie-list.html" id="back-to-movie-list" class="back-button">← Back to Movie List</a>
    <h1>Payment</h1>
    <section class="payment-summary">
        <h3>Order Total: $<span id="payment-total">0.00</span>
            <span class="payment-item-count">(<span id="payment-item-count">0</span> items)</span>
        </h3>
    </section>

    <p id="payment-error-message" class="payment-error"></p>

    <form id="payment-form">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required>

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required>

        <label for="creditCardNumber">Credit Card Number</label>
        <input type="text" id="creditCardNumber" name="creditCardNumber" required>

        <label for="expiration">Expiration Date</label>
        <input type="date" id="expiration" name="expiration" required>

        <button type="submit" id="place-order-button">Place Order</button>
        <a href="shopping-cart.html" class="back-button">Back to Cart</a>
    </form>
</main>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="js/payment.js"></script>
<script src="js/navbar-search.js"></script>
</body>
</html>
