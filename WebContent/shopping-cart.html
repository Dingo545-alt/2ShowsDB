<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/shopping-cart.css">
</head>
<body>
<!-- Navbar -->
<header class="main-navbar">
    <div class="navbar-content">
        <a href="main.html" class="logo">2Shows</a>
    </div>
    <form class="navbar-search" action="movie-list.html" method="GET">
        <div style="position:relative; display:flex; gap:6px; width:100%;">
            <input type="search"
                   id="navbar-search-input"
                   name="fulltext"
                   placeholder="Search movies…"
                   autocomplete="off">
            <button type="button" id="navbar-search-button">Search</button>
            <ul id="navbar-autocomplete-dropdown" class="autocomplete-dropdown" hidden></ul>
        </div>
    </form>
    <nav class="navbar-links">
        <a href="movie-list.html">Movies</a>
        <a href="_dashboard/index.html">Employee Dashboard</a>
        <a href="shopping-cart.html">Checkout</a>
        <a href="api/logout" class="logout-link">Logout</a>
    </nav>
</header>


<main class="cart-container">
    <a href="movie-list.html" id="back-to-movie-list" class="back-button">← Back to Movie List</a>
    <h1>Your Shopping Cart</h1>
    <p id="cart-empty-message" style="display:none;">Your cart is empty. <a href="movie-list.html">Browse movies</a>.</p>
    <table id="cart-table">
        <thead>
        <tr>
            <th>Movie Title</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="cart-body">
        <!-- rows injected by JS -->
        </tbody>
    </table>

    <div id="total-section">
        <h3>Total: $<span id="grand-total">0.00</span></h3>
        <button id="proceed-to-payment-button" type="button">Proceed to Payment</button>
    </div>
</main>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="js/shopping-cart.js"></script>
<script src="js/navbar-search.js"></script>
</body>
</html>
